<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pvtet-web: Interactive PV Tetrahedron Explorer</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
</head>
<body>
  <header id="app-header">
    <h1>pvtet-web: Interactive PV Tetrahedron Explorer</h1>
    <div class="header-actions">
      <button id="btn-export" title="Export current case as JSON">Export</button>
      <button id="btn-dark-mode" title="Toggle dark mode">Dark</button>
    </div>
  </header>

  <main id="app-main">
    <div id="panel-3d">
      <canvas id="tet-canvas"></canvas>
    </div>

    <div id="panel-ring">
      <svg id="ring-svg"></svg>
    </div>

    <div id="panel-controls">
      <h3>Gallery</h3>
      <select id="select-gallery" style="width:100%; margin-bottom:10px; font-size:12px">
        <option value="">-- Select a case --</option>
        <option value="0">Seed 0: Bubble (T0_Q2-_Cv_B)</option>
        <option value="1">Seed 1: Shared Root (T2_Q3+_SR)</option>
        <option value="4">Seed 4: 4 punctures (T4_Q3+_Cv)</option>
        <option value="5">Seed 5: Cross-infinity (T2_Q3+_Cw)</option>
        <option value="6">Seed 6: Q3- single root (T2_Q3-_Cw)</option>
        <option value="15">Seed 15: T4 Q3- (T4_Q3-)</option>
        <option value="118">Seed 118: 6 punctures (T6_Q3+)</option>
        <option value="898">Seed 898: Quadratic Q (T2_Q2)</option>
        <option value="1704">Seed 1704: D00 vertex (T4_Q3-_D00)</option>
        <option value="4325">Seed 4325: D01 edge (T1_Q3-_D01)</option>
      </select>

      <h3>V <span class="field-label">(4&times;3)</span></h3>
      <div id="v-grid" class="matrix-grid"></div>

      <h3>W <span class="field-label">(4&times;3)</span></h3>
      <div id="w-grid" class="matrix-grid"></div>

      <div class="button-row">
        <button id="btn-randomize">Randomize</button>
        <button id="btn-reset">Reset</button>
      </div>
      <div class="param-row">
        <label>Seed: <input id="input-seed" type="number" value="0" min="0" /></label>
      </div>
      <div class="param-row">
        <label>Range:
          <select id="select-range">
            <option value="3">[-3, 3]</option>
            <option value="5">[-5, 5]</option>
            <option value="9">[-9, 9]</option>
            <option value="20" selected>[-20, 20]</option>
            <option value="50">[-50, 50]</option>
          </select>
        </label>
      </div>
      <div class="param-row">
        <label><input id="chk-show-qroots" type="checkbox" checked /> Show Q-roots</label>
      </div>
      <div class="button-row">
        <button id="btn-reset-view">Reset 3D View</button>
      </div>

      <h3 style="margin-top:12px">Animation</h3>
      <div class="button-row">
        <button id="btn-animate">Play</button>
        <label style="font-size:12px">Speed:
          <input id="input-anim-speed" type="range" min="1" max="100" value="30" style="width:80px" />
        </label>
      </div>

      <h3 style="margin-top:12px">Search</h3>
      <div class="param-row">
        <input id="input-search" type="text" placeholder="e.g. SR, T6, D00" style="width:100%; font-size:12px; padding:4px" />
      </div>
      <div id="search-results" style="font-size:11px; max-height:100px; overflow-y:auto; color:#555"></div>

      <div style="margin-top:12px; font-size:11px; color:#999">
        Keyboard: &uarr;/&darr; change seed
      </div>
    </div>

    <div id="panel-info"></div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
